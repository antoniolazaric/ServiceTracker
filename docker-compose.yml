services:
  backend1:
    build: ./backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET=${SUPABASE_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - INSTANCE_ID=backend-1

  backend2:
    build: ./backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET=${SUPABASE_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - INSTANCE_ID=backend-2

  backend3:
    build: ./backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SECRET=${SUPABASE_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - INSTANCE_ID=backend-3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
